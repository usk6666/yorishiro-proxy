name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v0.1.0). Uses HEAD if empty."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      # Determine version from tag or workflow_dispatch input.
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      # Build Web UI once (output is embedded via go:embed, OS/Arch independent).
      - name: Build UI
        run: make build-ui

      - name: Run tests
        run: go test -race ./...

      # Cross-compile for all target platforms.
      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          COMMIT_SHORT="${COMMIT:0:7}"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT_SHORT} -X main.date=${DATE}"

          declare -a TARGETS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          for target in "${TARGETS[@]}"; do
            os="${target%/*}"
            arch="${target#*/}"
            output="yorishiro-proxy"
            if [ "${os}" = "windows" ]; then
              output="yorishiro-proxy.exe"
            fi

            echo "Building ${os}/${arch}..."
            GOOS="${os}" GOARCH="${arch}" go build \
              -ldflags "${LDFLAGS}" \
              -o "dist/${output}" \
              ./cmd/yorishiro-proxy

            # Archive: tar.gz for Linux/macOS, zip for Windows.
            archive_name="yorishiro-proxy-${VERSION}-${os}-${arch}"
            cd dist
            if [ "${os}" = "windows" ]; then
              zip "${archive_name}.zip" "${output}"
            else
              tar czf "${archive_name}.tar.gz" "${output}"
            fi
            rm "${output}"
            cd ..
          done

      # Generate checksums for all archives.
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      # Create GitHub Release and upload assets (tag push only).
      # If the release already exists (e.g., created via UI), upload assets to it.
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE=""
          if echo "${VERSION}" | grep -qE '[-](alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          if gh release view "${VERSION}" > /dev/null 2>&1; then
            echo "Release ${VERSION} already exists. Uploading assets..."
            gh release upload "${VERSION}" dist/* --clobber
          else
            gh release create "${VERSION}" \
              --title "${VERSION}" \
              --generate-notes \
              ${PRERELEASE} \
              dist/*
          fi

      # Upload artifacts for workflow_dispatch (no release created).
      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 7
